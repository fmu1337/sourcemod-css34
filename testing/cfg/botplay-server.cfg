// Botplay baseline for rom4s + SMAC recording sessions.
// Loaded via `exec botplay-server.cfg` after map load.

bot_quota 4
bot_quota_mode fill
bot_join_after_player 0

mp_roundtime 2
mp_freezetime 1
mp_autoteambalance 0
mp_limitteams 0

# mp_restartgame is sent from botplay-record.exp after bots fill.
