name: Build

on:
  push:
    branches:
      - master
      - 'cursor/**'
  pull_request:
  workflow_dispatch:

jobs:
  linux-stable:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            g++-9-multilib \
            gcc-9-multilib \
            git \
            lib32stdc++-9-dev \
            lib32stdc++6 \
            lib32z1-dev \
            libc6-dev-i386 \
            libstdc++-9-dev \
            linux-libc-dev \
            python3 \
            python3-pip

      - name: Build stable baseline (6572)
        env:
          SKIP_APT_INSTALL: 1
          CC: gcc-9
          CXX: g++-9
          SOURCEMOD_PROFILE: stable
        run: |
          export WDIR="$PWD"
          chmod +x builder/run/linux.sh builder/checkout-deps.sh builder/package.sh builder/prepare-package.sh builder/download-geolite2.sh builder/resolve-version.sh builder/apply-upstream-patches.sh builder/patches/*.sh
          builder/run/linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-linux-stable
          path: packages/sourcemod-*-css34-linux.tar.gz

  linux-experimental:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            g++-9-multilib \
            gcc-9-multilib \
            git \
            lib32stdc++-9-dev \
            lib32stdc++6 \
            lib32z1-dev \
            libc6-dev-i386 \
            libstdc++-9-dev \
            linux-libc-dev \
            python3 \
            python3-pip

      - name: Build experimental upstream (6970)
        env:
          SKIP_APT_INSTALL: 1
          CC: gcc-9
          CXX: g++-9
          SOURCEMOD_PROFILE: experimental
        run: |
          export WDIR="$PWD"
          chmod +x builder/run/linux.sh builder/checkout-deps.sh builder/package.sh builder/prepare-package.sh builder/download-geolite2.sh builder/resolve-version.sh builder/apply-upstream-patches.sh builder/patches/*.sh
          builder/run/linux.sh

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-linux-experimental
          path: packages/sourcemod-*-css34-linux.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build SourceMod for CS:S v34 (stable)
        shell: bash
        env:
          SOURCEMOD_PROFILE: stable
        run: |
          export WDIR="$PWD"
          builder/run/windows.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-windows
          path: packages/sourcemod-*-css34-windows.zip
