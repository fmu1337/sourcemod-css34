  # Botplay against published GitHub Release packages (SM 1.12 + SM 1.13 lines).
  # Master CI still builds 1.11; these lines are released from upgrade branches.
  test-release-botplay:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/cursor/')
    needs: [prepare-server]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - line: sm12
            tag: 1.12.0.7239-mm1.12.0
            sm_asset: sourcemod-1.12.0-git7239-css34-linux.tar.gz
            mm_asset: mmsource-1.12.0-dev-css34-linux.tar.gz
            sm_expect: "1.12.0.7239"
            mm_expect: "1.12.0"
          - line: sm13
            tag: 1.13.0.7394-mm1.12.0
            sm_asset: sourcemod-1.13.0-git7394-css34-linux.tar.gz
            mm_asset: mmsource-1.12.0-dev-css34-linux.tar.gz
            sm_expect: "1.13.0.7394"
            mm_expect: "1.12.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cached server tree
        uses: actions/cache/restore@v4
        with:
          path: server-art/css34-server.tar.gz
          key: css34-server-v1-${{ github.event.inputs.apply_srcds_patch || '1' }}-${{ hashFiles('testing/scripts/fetch-server.sh', 'testing/scripts/apply-valve-rc-fix.sh', 'testing/scripts/apply-srcds-patch.sh', 'testing/scripts/trim-server-maps.sh') }}
          fail-on-cache-miss: true

      - name: Download release packages (${{ matrix.tag }})
        env:
          TAG: ${{ matrix.tag }}
          SM_ASSET: ${{ matrix.sm_asset }}
          MM_ASSET: ${{ matrix.mm_asset }}
        run: |
          set -euo pipefail
          mkdir -p packages
          base="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          curl -fL --retry 5 --retry-delay 3 -o "packages/${SM_ASSET}" "${base}/${SM_ASSET}"
          curl -fL --retry 5 --retry-delay 3 -o "packages/${MM_ASSET}" "${base}/${MM_ASSET}"
          ls -la packages/

      - name: Release botplay stress (${{ matrix.line }} / debian:latest)
        env:
          IMAGE: debian:latest
          RECORD_SECS: ${{ github.event.inputs.record_secs || '600' }}
          BOTPLAY_PROFILE: release
          BOTPLAY_CFG: botplay-stress.cfg
          BOTPLAY_MAPS: de_dust2,de_inferno,de_nuke
          MM_VERSION_EXPECT: ${{ matrix.mm_expect }}
          SM_VERSION_EXPECT: ${{ matrix.sm_expect }}
          SM_ASSET: ${{ matrix.sm_asset }}
          MM_ASSET: ${{ matrix.mm_asset }}
          LINE: ${{ matrix.line }}
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          SM_PACKAGE="packages/${SM_ASSET}"
          MM_PACKAGE="packages/${MM_ASSET}"
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e RECORD_SECS \
            -e BOTPLAY_PROFILE \
            -e BOTPLAY_CFG \
            -e BOTPLAY_MAPS \
            -e MM_VERSION_EXPECT \
            -e SM_VERSION_EXPECT \
            -e SM_PACKAGE="/workspace/${SM_PACKAGE}" \
            -e MM_PACKAGE="/workspace/${MM_PACKAGE}" \
            -e REPORT_JSON=/workspace/.ci-server/release-botplay-report.json \
            -e REPORT_TXT=/workspace/.ci-server/release-botplay-report.txt \
            -e SMOKE_CONDEBUG=1 \
            -e SMOKE_VERBOSE=1 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/botplay-test.sh
            '

      - name: Compare release botplay vs rom4s baseline
        if: always()
        run: |
          set -euo pipefail
          chmod +x testing/scripts/compare-botplay-reports.sh
          if [[ -f .ci-server/release-botplay-report.json ]]; then
            testing/scripts/compare-botplay-reports.sh \
              testing/botplay/rom4s-baseline.json \
              .ci-server/release-botplay-report.json \
              .ci-server/botplay-compare.txt || true
            cat .ci-server/botplay-compare.txt || true
          else
            echo "No release-botplay-report.json to compare" >&2
          fi

      - name: Upload release botplay report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-botplay-report-${{ matrix.line }}
          path: |
            .ci-server/release-botplay-report.json
            .ci-server/release-botplay-report.txt
            .ci-server/botplay-compare.txt
            .ci-server/botplay.log
            .ci-server/botplay-run.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
