name: Test Server

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      apply_srcds_patch:
        description: "Apply bruno_args srcds_patch (1/0)"
        required: false
        default: "1"
      css34_line:
        description: "Optional single CSS34_LINE (sm11-oldstable|sm12-latest|sm13-dev|sm13-mm20); empty = matrix"
        required: false
        default: ""

concurrency:
  group: test-server-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SRCDS_PATCH_URL: https://github.com/fmu1337/sourcemod-css34/raw/bufferfix/srcds_patch%20(1).rar
  PURE_SOURCE_BUILD: "1"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - line: sm11-oldstable
            sm_expect: "1.11.0.6970"
            mm_expect: "1.10.7"
            sm_commit: f53cb134ef83b580c83e1f4bf35f60d11c4571dd
            mm_commit: 80e8ff0be3b62386bbd6f937e97b819ef8be6dd2
          - line: sm12-latest
            sm_expect: "1.12.0.7245"
            mm_expect: "1.12.0"
            sm_commit: f8490c8104a844fbf1826cd8b8f22900b86adf8a
            mm_commit: 364cb6c26f66f7d9254d95a2fc533eac3557166b
          - line: sm13-dev
            sm_expect: "1.13.0.7404"
            mm_expect: "1.12.0"
            sm_commit: cdedec7606f1ee9bf3685b2cce3620fbec90efa8
            mm_commit: 364cb6c26f66f7d9254d95a2fc533eac3557166b
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Maybe skip non-selected lines
        id: select
        run: |
          want="${{ github.event.inputs.css34_line }}"
          if [[ -n "$want" && "$want" != "${{ matrix.line }}" ]]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build SourceMod+Metamod (${{ matrix.line }}) pure-source
        if: steps.select.outputs.skip != '1'
        env:
          CSS34_LINE: ${{ matrix.line }}
          PURE_SOURCE_BUILD: "1"
        run: |
          chmod +x builder/docker/legacy-build.sh builder/run/linux.sh \
            builder/checkout-deps.sh builder/package.sh builder/package-metamod.sh \
            builder/build-metamod.sh builder/prepare-package.sh builder/write-build-stamps.sh \
            builder/resolve-version.sh builder/py.sh builder/patches/*.sh \
            builder/install-clang9.sh builder/install-clang10.sh
          builder/docker/legacy-build.sh

      - name: Upload SourceMod package
        if: steps.select.outputs.skip != '1'
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-linux-${{ matrix.line }}
          path: packages/sourcemod-*-css34-linux.tar.gz
          if-no-files-found: error
          retention-days: 2

      - name: Upload Metamod package
        if: steps.select.outputs.skip != '1'
        uses: actions/upload-artifact@v4
        with:
          name: metamod-css34-linux-${{ matrix.line }}
          path: packages/mmsource-*-css34-linux.tar.gz
          if-no-files-found: error
          retention-days: 2

  check-built-package:
    needs: [build-linux]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - line: sm11-oldstable
          - line: sm12-latest
          - line: sm13-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maybe skip
        id: select
        run: |
          want="${{ github.event.inputs.css34_line }}"
          if [[ -n "$want" && "$want" != "${{ matrix.line }}" ]]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packages
        if: steps.select.outputs.skip != '1'
        uses: actions/download-artifact@v4
        with:
          pattern: '*-${{ matrix.line }}'
          path: packages
          merge-multiple: true

      - name: ABI / export checks
        if: steps.select.outputs.skip != '1'
        run: |
          chmod +x testing/scripts/*.sh
          sudo apt-get update
          sudo apt-get install -y binutils
          ls -la packages || true
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          export SM_PACKAGE MM_PACKAGE
          echo "Checking ${SM_PACKAGE}"
          testing/scripts/check-package.sh
          echo "Checking ${MM_PACKAGE}"
          testing/scripts/check-metamod-package.sh

  prepare-server:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install extract tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip unrar

      - name: Fetch CS:S v34 server
        env:
          SERVER_DIR: ${{ github.workspace }}/.ci-server
          CACHE_DIR: ${{ github.workspace }}/.ci-cache
          APPLY_SRCDS_PATCH: ${{ github.event.inputs.apply_srcds_patch || '1' }}
          APPLY_VALVE_RC: ${{ github.event.inputs.apply_srcds_patch || '1' }}
        run: |
          chmod +x testing/scripts/*.sh
          testing/scripts/fetch-server.sh
          if [[ "${APPLY_SRCDS_PATCH}" == "1" ]]; then
            testing/scripts/apply-valve-rc-fix.sh
            testing/scripts/apply-srcds-patch.sh
          fi
          KEEP_MAP=de_dust2 testing/scripts/trim-server-maps.sh

      - name: Pack server tree
        run: |
          tar -C .ci-server -czf css34-server.tar.gz .
          ls -lh css34-server.tar.gz

      - name: Upload server tree
        uses: actions/upload-artifact@v4
        with:
          name: css34-server-tree
          path: css34-server.tar.gz
          retention-days: 3

  # Primary gate: pure-source matched SM×MM lines on modern glibc.
  # Packages are produced in debian:11 (legacy-build.sh).
  test-built-debian:
    needs: [build-linux, prepare-server, check-built-package]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - line: sm11-oldstable
            image: debian:11
            sm_expect: "1.11.0.6970"
            mm_expect: "1.10.7"
            sm_commit: f53cb134ef83b580c83e1f4bf35f60d11c4571dd
            mm_commit: 80e8ff0be3b62386bbd6f937e97b819ef8be6dd2
          - line: sm12-latest
            image: debian:11
            sm_expect: "1.12.0.7245"
            mm_expect: "1.12.0"
            sm_commit: f8490c8104a844fbf1826cd8b8f22900b86adf8a
            mm_commit: 364cb6c26f66f7d9254d95a2fc533eac3557166b
          - line: sm13-dev
            image: debian:11
            sm_expect: "1.13.0.7404"
            mm_expect: "1.12.0"
            sm_commit: cdedec7606f1ee9bf3685b2cce3620fbec90efa8
            mm_commit: 364cb6c26f66f7d9254d95a2fc533eac3557166b
          - line: sm13-dev
            image: debian:latest
            sm_expect: "1.13.0.7404"
            mm_expect: "1.12.0"
            sm_commit: cdedec7606f1ee9bf3685b2cce3620fbec90efa8
            mm_commit: 364cb6c26f66f7d9254d95a2fc533eac3557166b
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maybe skip
        id: select
        run: |
          want="${{ github.event.inputs.css34_line }}"
          if [[ -n "$want" && "$want" != "${{ matrix.line }}" ]]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packages
        if: steps.select.outputs.skip != '1'
        uses: actions/download-artifact@v4
        with:
          pattern: '*-${{ matrix.line }}'
          path: packages
          merge-multiple: true

      - name: Download server tree
        if: steps.select.outputs.skip != '1'
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Smoke test ${{ matrix.line }} in ${{ matrix.image }}
        if: steps.select.outputs.skip != '1'
        env:
          IMAGE: ${{ matrix.image }}
          MM_VERSION_EXPECT: ${{ matrix.mm_expect }}
          SM_VERSION_EXPECT: ${{ matrix.sm_expect }}
          MM_COMMIT_EXPECT: ${{ matrix.mm_commit }}
          SM_COMMIT_EXPECT: ${{ matrix.sm_commit }}
          CSS34_PACK_COMMIT_EXPECT: ${{ github.sha }}
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e SM_PACKAGE="/workspace/${SM_PACKAGE}" \
            -e MM_PACKAGE="/workspace/${MM_PACKAGE}" \
            -e MM_VERSION_EXPECT \
            -e SM_VERSION_EXPECT \
            -e MM_COMMIT_EXPECT \
            -e SM_COMMIT_EXPECT \
            -e CSS34_PACK_COMMIT_EXPECT \
            -e TIMEOUT_SECS=120 \
            -e SMOKE_CONDEBUG=1 \
            -e SMOKE_VERBOSE=1 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/install-addons.sh
              testing/scripts/smoke-test.sh
            '

      - name: Upload smoke logs on failure
        if: failure() && steps.select.outputs.skip != '1'
        uses: actions/upload-artifact@v4
        with:
          name: built-debian-smoke-logs-${{ matrix.line }}-${{ strategy.job-index }}
          path: |
            .ci-server/smoke.log
            .ci-server/console-probe.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/metamod/bin/metamod-fatal.log
            .ci-server/addons/metamod/bin/metamod-fatal.log
            .ci-server/metamod-fatal.log
            .ci-server/cstrike/metamod-fatal.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 7

  test-built-rhel:
    needs: [build-linux, prepare-server, check-built-package]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - line: sm13-dev
            image: rockylinux:9
            sm_expect: "1.13.0.7404"
            mm_expect: "1.12.0"
            sm_commit: cdedec7606f1ee9bf3685b2cce3620fbec90efa8
            mm_commit: 364cb6c26f66f7d9254d95a2fc533eac3557166b
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maybe skip
        id: select
        run: |
          want="${{ github.event.inputs.css34_line }}"
          if [[ -n "$want" && "$want" != "${{ matrix.line }}" ]]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packages
        if: steps.select.outputs.skip != '1'
        uses: actions/download-artifact@v4
        with:
          pattern: '*-${{ matrix.line }}'
          path: packages
          merge-multiple: true

      - name: Download server tree
        if: steps.select.outputs.skip != '1'
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Smoke test ${{ matrix.line }} in ${{ matrix.image }}
        if: steps.select.outputs.skip != '1'
        env:
          IMAGE: ${{ matrix.image }}
          MM_VERSION_EXPECT: ${{ matrix.mm_expect }}
          SM_VERSION_EXPECT: ${{ matrix.sm_expect }}
          MM_COMMIT_EXPECT: ${{ matrix.mm_commit }}
          SM_COMMIT_EXPECT: ${{ matrix.sm_commit }}
          CSS34_PACK_COMMIT_EXPECT: ${{ github.sha }}
          SRCDS_BINARY: ./srcds_i686
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e SM_PACKAGE="/workspace/${SM_PACKAGE}" \
            -e MM_PACKAGE="/workspace/${MM_PACKAGE}" \
            -e MM_VERSION_EXPECT \
            -e SM_VERSION_EXPECT \
            -e MM_COMMIT_EXPECT \
            -e SM_COMMIT_EXPECT \
            -e CSS34_PACK_COMMIT_EXPECT \
            -e SRCDS_BINARY \
            -e TIMEOUT_SECS=120 \
            -e SMOKE_CONDEBUG=1 \
            -e SMOKE_VERBOSE=1 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/install-addons.sh
              testing/scripts/smoke-test.sh
            '

      - name: Upload smoke logs on failure
        if: failure() && steps.select.outputs.skip != '1'
        uses: actions/upload-artifact@v4
        with:
          name: built-rhel-smoke-logs-${{ matrix.line }}
          path: |
            .ci-server/smoke.log
            .ci-server/console-probe.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/metamod/bin/metamod-fatal.log
            .ci-server/addons/metamod/bin/metamod-fatal.log
            .ci-server/metamod-fatal.log
            .ci-server/cstrike/metamod-fatal.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 7

  # Boots freshly built Metamod + SourceMod on the GitHub Actions host runner.
  test-built-smoke:
    needs: [build-linux, prepare-server, check-built-package]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packages (sm13-dev)
        uses: actions/download-artifact@v4
        with:
          pattern: '*-sm13-dev'
          path: packages
          merge-multiple: true

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Install host 32-bit runtime
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y expect lib32gcc-s1 lib32stdc++6 lib32z1 libc6-i386 libstdc++6:i386 zlib1g:i386

      - name: Smoke test built Metamod + built SourceMod
        env:
          SERVER_DIR: ${{ github.workspace }}/.ci-server
          CACHE_DIR: ${{ github.workspace }}/.ci-cache
          MM_VERSION_EXPECT: "1.12.0"
          SM_VERSION_EXPECT: "1.13.0.7404"
          MM_COMMIT_EXPECT: "364cb6c26f66f7d9254d95a2fc533eac3557166b"
          SM_COMMIT_EXPECT: "cdedec7606f1ee9bf3685b2cce3620fbec90efa8"
          CSS34_PACK_COMMIT_EXPECT: ${{ github.sha }}
          TIMEOUT_SECS: 120
          SMOKE_CONDEBUG: "1"
          SMOKE_VERBOSE: "1"
        run: |
          chmod +x testing/scripts/*.sh
          mkdir -p .ci-server .ci-cache
          tar -xzf server-art/css34-server.tar.gz -C .ci-server
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          export SM_PACKAGE MM_PACKAGE
          testing/scripts/install-addons.sh
          testing/scripts/smoke-test.sh

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: built-smoke-logs
          path: |
            .ci-server/smoke.log
            .ci-server/console-probe.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/metamod/bin/metamod-fatal.log
            .ci-server/addons/metamod/bin/metamod-fatal.log
            .ci-server/metamod-fatal.log
            .ci-server/cstrike/metamod-fatal.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 7
