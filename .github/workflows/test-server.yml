name: Test Server

on:
  push:
    branches:
      - master
      - 'cursor/**'
  pull_request:
  workflow_dispatch:
    inputs:
      sm_url:
        description: "Optional SourceMod tar.gz URL for the distro matrix (default: rom4s 6572 reference)"
        required: false
        default: ""
      apply_srcds_patch:
        description: "Apply bruno_args srcds_patch (1/0)"
        required: false
        default: "1"

concurrency:
  group: test-server-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MM_URL: https://bitbucket.org/rom4s/mmsdrop-1.10/downloads/mmsource-1.10.6-css34-linux.tar.gz
  SRCDS_PATCH_URL: https://github.com/fmu1337/sourcemod-css34/raw/bufferfix/srcds_patch%20(1).rar
  REFERENCE_SM_URL: https://github.com/rom4s/sourcemod-css34/releases/download/v1.11.0.6572/sourcemod-1.11.0-git6572-css34-linux.tar.gz

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            curl g++-9-multilib gcc-9-multilib git \
            lib32stdc++-9-dev lib32stdc++6 lib32z1-dev \
            libc6-dev-i386 libstdc++-9-dev linux-libc-dev \
            python3 python3-pip binutils

      - name: Build SourceMod for CS:S v34
        env:
          SKIP_APT_INSTALL: 1
          CC: gcc-9
          CXX: g++-9
          SOURCEMOD_COMMIT: 832519ab647cdecb85763918dbfed1cb5e79c6cb
          SOURCEMOD_GIT_REV: "6572"
        run: |
          export WDIR="$PWD"
          chmod +x builder/run/linux.sh builder/checkout-deps.sh builder/package.sh \
            builder/prepare-package.sh builder/py.sh builder/patches/*.sh
          builder/run/linux.sh

      - name: Upload SourceMod package
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages/sourcemod-*-css34-linux.tar.gz
          if-no-files-found: error

  check-built-package:
    needs: [build-linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SourceMod package
        uses: actions/download-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages

      - name: ABI / export checks
        run: |
          chmod +x testing/scripts/*.sh
          sudo apt-get update
          sudo apt-get install -y binutils
          ls -la packages || true
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          if [[ -z "${SM_PACKAGE}" || ! -f "${SM_PACKAGE}" ]]; then
            echo "No SourceMod package found under packages/" >&2
            exit 1
          fi
          export SM_PACKAGE
          echo "Checking ${SM_PACKAGE}"
          testing/scripts/check-package.sh

  prepare-server:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install extract tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip unrar

      - name: Fetch CS:S v34 server
        env:
          SERVER_DIR: ${{ github.workspace }}/.ci-server
          CACHE_DIR: ${{ github.workspace }}/.ci-cache
          APPLY_SRCDS_PATCH: ${{ github.event.inputs.apply_srcds_patch || '1' }}
          APPLY_VALVE_RC: ${{ github.event.inputs.apply_srcds_patch || '1' }}
        run: |
          chmod +x testing/scripts/*.sh
          testing/scripts/fetch-server.sh
          if [[ "${APPLY_SRCDS_PATCH}" == "1" ]]; then
            testing/scripts/apply-valve-rc-fix.sh
            testing/scripts/apply-srcds-patch.sh
          fi
          KEEP_MAP=de_dust2 testing/scripts/trim-server-maps.sh

      - name: Pack server tree
        run: |
          tar -C .ci-server -czf css34-server.tar.gz .
          ls -lh css34-server.tar.gz

      - name: Upload server tree
        uses: actions/upload-artifact@v4
        with:
          name: css34-server-tree
          path: css34-server.tar.gz
          retention-days: 3

  # Distro matrix uses a known-good reference SM package so the harness
  # (deps / srcds_patch / MM / boot) can be validated independently of the
  # current in-tree build ABI status.
  test-debian:
    needs: [prepare-server]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:8
          - debian:9
          - debian:10
          - debian:11
          - debian:12
          - debian:13
          - debian:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Smoke test in ${{ matrix.image }}
        env:
          IMAGE: ${{ matrix.image }}
          MM_URL: ${{ env.MM_URL }}
          SM_URL: ${{ github.event.inputs.sm_url || env.REFERENCE_SM_URL }}
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e SM_URL \
            -e MM_URL \
            -e TIMEOUT_SECS=120 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/install-addons.sh
              testing/scripts/smoke-test.sh
            '

  test-centos:
    needs: [prepare-server]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # RHEL span: el7 (old glibc) + el9 (new). el8 is a known srcds/pty
          # footgun with this rom4s v34 server under expect — skip until we have
          # a non-pty probe path for it.
          - image: centos:7
          - image: rockylinux:9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Smoke test in ${{ matrix.image }}
        env:
          IMAGE: ${{ matrix.image }}
          MM_URL: ${{ env.MM_URL }}
          SM_URL: ${{ github.event.inputs.sm_url || env.REFERENCE_SM_URL }}
          SRCDS_BINARY: ${{ matrix.srcds_binary || './srcds_i686' }}
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e SM_URL \
            -e MM_URL \
            -e SRCDS_BINARY \
            -e TIMEOUT_SECS=120 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/install-addons.sh
              testing/scripts/smoke-test.sh
            '

  # Boots the freshly built package on the build host OS (Ubuntu 22.04 / modern glibc).
  # continue-on-error: in-tree sourcemod.logic.so still blocks SM session; harness
  # itself is validated by the rom4s reference matrix above.
  test-built-smoke:
    needs: [build-linux, prepare-server, check-built-package]
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SourceMod package
        uses: actions/download-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Install host 32-bit runtime
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y expect lib32gcc-s1 lib32stdc++6 lib32z1 libc6-i386 libstdc++6:i386 zlib1g:i386

      - name: Smoke test built package
        env:
          SERVER_DIR: ${{ github.workspace }}/.ci-server
          CACHE_DIR: ${{ github.workspace }}/.ci-cache
          MM_URL: ${{ env.MM_URL }}
          TIMEOUT_SECS: 120
          SMOKE_CONDEBUG: "1"
          SMOKE_VERBOSE: "1"
        run: |
          chmod +x testing/scripts/*.sh
          mkdir -p .ci-server
          tar -xzf server-art/css34-server.tar.gz -C .ci-server
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          export SM_PACKAGE
          testing/scripts/install-addons.sh
          testing/scripts/smoke-test.sh

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: built-smoke-logs
          path: |
            .ci-server/smoke.log
            .ci-server/console-probe.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 7
