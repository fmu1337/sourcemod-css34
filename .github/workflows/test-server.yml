name: Test Server

on:
  push:
    branches:
      - master
      - 'cursor/**'
  pull_request:
  workflow_dispatch:
    inputs:
      apply_srcds_patch:
        description: "Apply bruno_args srcds_patch (1/0)"
        required: false
        default: "1"
      record_secs:
        description: "Botplay recording length in seconds (rom4s job)"
        required: false
        default: "600"

concurrency:
  group: test-server-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SRCDS_PATCH_URL: https://github.com/fmu1337/sourcemod-css34/raw/bufferfix/srcds_patch%20(1).rar

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build SourceMod for CS:S v34
        env:
          SOURCEMOD_COMMIT: 832519ab647cdecb85763918dbfed1cb5e79c6cb
          SOURCEMOD_GIT_REV: "6572"
          MMS_COMMIT: 80e8ff0be3b62386bbd6f937e97b819ef8be6dd2
        run: |
          chmod +x builder/docker/legacy-build.sh builder/run/linux.sh \
            builder/checkout-deps.sh builder/package.sh builder/package-metamod.sh \
            builder/build-metamod.sh builder/prepare-package.sh builder/write-build-stamps.sh \
            builder/py.sh builder/patches/*.sh \
            builder/install-clang9.sh builder/install-clang10.sh
          builder/docker/legacy-build.sh

      - name: Upload SourceMod package
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages/sourcemod-*-css34-linux.tar.gz
          if-no-files-found: error

      - name: Upload Metamod package
        uses: actions/upload-artifact@v4
        with:
          name: metamod-css34-linux-for-test
          path: packages/mmsource-*-css34-linux.tar.gz
          if-no-files-found: error

  check-built-package:
    needs: [build-linux]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SourceMod package
        uses: actions/download-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages

      - name: ABI / export checks
        run: |
          chmod +x testing/scripts/*.sh
          sudo apt-get update
          sudo apt-get install -y binutils
          ls -la packages || true
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          if [[ -z "${SM_PACKAGE}" || ! -f "${SM_PACKAGE}" ]]; then
            echo "No SourceMod package found under packages/" >&2
            exit 1
          fi
          export SM_PACKAGE
          echo "Checking ${SM_PACKAGE}"
          testing/scripts/check-package.sh

  prepare-server:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install extract tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip unrar

      - name: Fetch CS:S v34 server
        env:
          SERVER_DIR: ${{ github.workspace }}/.ci-server
          CACHE_DIR: ${{ github.workspace }}/.ci-cache
          APPLY_SRCDS_PATCH: ${{ github.event.inputs.apply_srcds_patch || '1' }}
          APPLY_VALVE_RC: ${{ github.event.inputs.apply_srcds_patch || '1' }}
        run: |
          chmod +x testing/scripts/*.sh
          testing/scripts/fetch-server.sh
          if [[ "${APPLY_SRCDS_PATCH}" == "1" ]]; then
            testing/scripts/apply-valve-rc-fix.sh
            testing/scripts/apply-srcds-patch.sh
          fi
          KEEP_MAP=de_dust2 testing/scripts/trim-server-maps.sh

      - name: Pack server tree
        run: |
          tar -C .ci-server -czf css34-server.tar.gz .
          ls -lh css34-server.tar.gz

      - name: Upload server tree
        uses: actions/upload-artifact@v4
        with:
          name: css34-server-tree
          path: css34-server.tar.gz
          retention-days: 3

  # Primary gate: our built Metamod 1.10.7 + SourceMod 6572 on modern glibc.
  # Packages are produced in debian:11 (legacy-build.sh), so Debian 11+ / Rocky 9.
  test-built-debian:
    needs: [build-linux, prepare-server, check-built-package]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:11
          - debian:12
          - debian:13
          - debian:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SourceMod package
        uses: actions/download-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages

      - name: Download Metamod package
        uses: actions/download-artifact@v4
        with:
          name: metamod-css34-linux-for-test
          path: packages

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Smoke test built SM+MM in ${{ matrix.image }}
        env:
          IMAGE: ${{ matrix.image }}
          MM_VERSION_EXPECT: "1.10.7"
          SM_VERSION_EXPECT: "1.11.0.6572"
          MM_COMMIT_EXPECT: "80e8ff0be3b62386bbd6f937e97b819ef8be6dd2"
          SM_COMMIT_EXPECT: "832519ab647cdecb85763918dbfed1cb5e79c6cb"
          CSS34_PACK_COMMIT_EXPECT: ${{ github.sha }}
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e SM_PACKAGE="/workspace/${SM_PACKAGE}" \
            -e MM_PACKAGE="/workspace/${MM_PACKAGE}" \
            -e MM_VERSION_EXPECT \
            -e SM_VERSION_EXPECT \
            -e MM_COMMIT_EXPECT \
            -e SM_COMMIT_EXPECT \
            -e CSS34_PACK_COMMIT_EXPECT \
            -e TIMEOUT_SECS=120 \
            -e SMOKE_CONDEBUG=1 \
            -e SMOKE_VERBOSE=1 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/install-addons.sh
              testing/scripts/smoke-test.sh
            '

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: built-debian-smoke-logs-${{ strategy.job-index }}
          path: |
            .ci-server/smoke.log
            .ci-server/console-probe.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 7

  test-built-rhel:
    needs: [build-linux, prepare-server, check-built-package]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: rockylinux:9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SourceMod package
        uses: actions/download-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages

      - name: Download Metamod package
        uses: actions/download-artifact@v4
        with:
          name: metamod-css34-linux-for-test
          path: packages

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Smoke test built SM+MM in ${{ matrix.image }}
        env:
          IMAGE: ${{ matrix.image }}
          MM_VERSION_EXPECT: "1.10.7"
          SM_VERSION_EXPECT: "1.11.0.6572"
          MM_COMMIT_EXPECT: "80e8ff0be3b62386bbd6f937e97b819ef8be6dd2"
          SM_COMMIT_EXPECT: "832519ab647cdecb85763918dbfed1cb5e79c6cb"
          CSS34_PACK_COMMIT_EXPECT: ${{ github.sha }}
          SRCDS_BINARY: ${{ matrix.srcds_binary || './srcds_i686' }}
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e SM_PACKAGE="/workspace/${SM_PACKAGE}" \
            -e MM_PACKAGE="/workspace/${MM_PACKAGE}" \
            -e MM_VERSION_EXPECT \
            -e SM_VERSION_EXPECT \
            -e MM_COMMIT_EXPECT \
            -e SM_COMMIT_EXPECT \
            -e CSS34_PACK_COMMIT_EXPECT \
            -e SRCDS_BINARY \
            -e TIMEOUT_SECS=120 \
            -e SMOKE_CONDEBUG=1 \
            -e SMOKE_VERBOSE=1 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/install-addons.sh
              testing/scripts/smoke-test.sh
            '

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: built-rhel-smoke-logs-${{ strategy.job-index }}
          path: |
            .ci-server/smoke.log
            .ci-server/console-probe.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 7

  # Boots freshly built Metamod + SourceMod on the GitHub Actions host runner.
  test-built-smoke:
    needs: [build-linux, prepare-server, check-built-package]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SourceMod package
        uses: actions/download-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages

      - name: Download Metamod package
        uses: actions/download-artifact@v4
        with:
          name: metamod-css34-linux-for-test
          path: packages

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Install host 32-bit runtime
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y expect lib32gcc-s1 lib32stdc++6 lib32z1 libc6-i386 libstdc++6:i386 zlib1g:i386

      - name: Smoke test built Metamod + built SourceMod
        env:
          SERVER_DIR: ${{ github.workspace }}/.ci-server
          CACHE_DIR: ${{ github.workspace }}/.ci-cache
          MM_VERSION_EXPECT: "1.10.7"
          SM_VERSION_EXPECT: "1.11.0.6572"
          MM_COMMIT_EXPECT: "80e8ff0be3b62386bbd6f937e97b819ef8be6dd2"
          SM_COMMIT_EXPECT: "832519ab647cdecb85763918dbfed1cb5e79c6cb"
          CSS34_PACK_COMMIT_EXPECT: ${{ github.sha }}
          TIMEOUT_SECS: 120
          SMOKE_CONDEBUG: "1"
          SMOKE_VERBOSE: "1"
        run: |
          chmod +x testing/scripts/*.sh
          mkdir -p .ci-server .ci-cache
          tar -xzf server-art/css34-server.tar.gz -C .ci-server
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          export SM_PACKAGE MM_PACKAGE
          testing/scripts/install-addons.sh
          testing/scripts/smoke-test.sh

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: built-smoke-logs
          path: |
            .ci-server/smoke.log
            .ci-server/console-probe.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 7

  # Baseline capture: rom4s MM 1.10.6 + SM 6572 + SMAC + 4 bots for ~10 minutes.
  # Parses round_start / round_end / player_death from engine console.log.
  test-rom4s-botplay:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/cursor/')
    needs: [prepare-server]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Rom4s botplay recording (debian:11)
        env:
          IMAGE: debian:11
          RECORD_SECS: ${{ github.event.inputs.record_secs || '600' }}
          BOTPLAY_PROFILE: rom4s
          MM_VERSION_EXPECT: "1.10.6"
          SM_VERSION_EXPECT: "1.11.0.6572"
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e RECORD_SECS \
            -e BOTPLAY_PROFILE \
            -e MM_VERSION_EXPECT \
            -e SM_VERSION_EXPECT \
            -e SMOKE_CONDEBUG=1 \
            -e SMOKE_VERBOSE=1 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/botplay-test.sh
            '

      - name: Upload botplay report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rom4s-botplay-report
          path: |
            .ci-server/botplay-report.json
            .ci-server/botplay-report.txt
            .ci-server/botplay.log
            .ci-server/botplay-run.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 14

  # Same botplay session on in-tree MM 1.10.7 + SM 6572, compared to rom4s baseline.
  test-built-botplay:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/cursor/')
    needs: [build-linux, prepare-server]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SourceMod package
        uses: actions/download-artifact@v4
        with:
          name: sourcemod-css34-linux-for-test
          path: packages

      - name: Download Metamod package
        uses: actions/download-artifact@v4
        with:
          name: metamod-css34-linux-for-test
          path: packages

      - name: Download server tree
        uses: actions/download-artifact@v4
        with:
          name: css34-server-tree
          path: server-art

      - name: Built botplay recording + compare (debian:11)
        env:
          IMAGE: debian:11
          RECORD_SECS: ${{ github.event.inputs.record_secs || '600' }}
          BOTPLAY_PROFILE: built
          MM_VERSION_EXPECT: "1.10.7"
          SM_VERSION_EXPECT: "1.11.0.6572"
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e SERVER_DIR=/workspace/.ci-server \
            -e CACHE_DIR=/workspace/.ci-cache \
            -e RECORD_SECS \
            -e BOTPLAY_PROFILE \
            -e MM_VERSION_EXPECT \
            -e SM_VERSION_EXPECT \
            -e SM_PACKAGE="/workspace/${SM_PACKAGE}" \
            -e MM_PACKAGE="/workspace/${MM_PACKAGE}" \
            -e REPORT_JSON=/workspace/.ci-server/built-botplay-report.json \
            -e REPORT_TXT=/workspace/.ci-server/built-botplay-report.txt \
            -e SMOKE_CONDEBUG=1 \
            -e SMOKE_VERBOSE=1 \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server
              testing/scripts/install-deps.sh
              testing/scripts/botplay-test.sh
              testing/scripts/compare-botplay-reports.sh \
                /workspace/testing/botplay/rom4s-baseline.json \
                /workspace/.ci-server/built-botplay-report.json \
                /workspace/.ci-server/botplay-compare.txt
            '

      - name: Upload built botplay report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: built-botplay-report
          path: |
            .ci-server/built-botplay-report.json
            .ci-server/built-botplay-report.txt
            .ci-server/botplay-compare.txt
            .ci-server/botplay.log
            .ci-server/botplay-run.log
            .ci-server/cstrike/console.log
            .ci-server/cstrike/addons/sourcemod/logs/L*.log
          if-no-files-found: ignore
          retention-days: 14
