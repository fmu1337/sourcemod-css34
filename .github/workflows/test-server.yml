  # Optional diagnostics: short botplay cases (slow; workflow_dispatch only).
  test-botplay-bisect:
    if: github.event_name == 'workflow_dispatch' && inputs.run_botplay_bisect == true
    needs: [build-linux, prepare-server]
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packages (sm13-dev)
        uses: actions/download-artifact@v4
        with:
          pattern: '*-sm13-dev'
          path: packages
          merge-multiple: true

      - name: Restore cached server tree
        uses: actions/cache/restore@v4
        with:
          path: server-art/css34-server.tar.gz
          key: css34-server-v1-${{ github.event.inputs.apply_srcds_patch || '1' }}-${{ hashFiles('testing/scripts/fetch-server.sh', 'testing/scripts/apply-valve-rc-fix.sh', 'testing/scripts/apply-srcds-patch.sh', 'testing/scripts/trim-server-maps.sh') }}
          fail-on-cache-miss: true

      - name: Botplay bisect quick matrix (debian:latest, 90s/case)
        env:
          IMAGE: debian:latest
          RECORD_SECS: "90"
          BISECT_SET: quick
        run: |
          set -euo pipefail
          chmod +x testing/scripts/*.sh
          SM_PACKAGE="$(ls packages/sourcemod-*-css34-linux.tar.gz | head -n1)"
          MM_PACKAGE="$(ls packages/mmsource-*-css34-linux.tar.gz | head -n1)"
          docker run --rm --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -e RECORD_SECS \
            -e BISECT_SET \
            -e SM_PACKAGE="/workspace/${SM_PACKAGE}" \
            -e MM_PACKAGE="/workspace/${MM_PACKAGE}" \
            -e BISECT_OUT=/workspace/.ci-bisect/results.tsv \
            -w /workspace \
            "${IMAGE}" \
            bash -lc '
              set -euo pipefail
              mkdir -p /workspace/.ci-server-seed /workspace/.ci-cache
              tar -xzf /workspace/server-art/css34-server.tar.gz -C /workspace/.ci-server-seed
              testing/scripts/install-deps.sh
              testing/scripts/botplay-bisect.sh
              cat /workspace/.ci-bisect/results.tsv
            '

      - name: Upload bisect results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: botplay-bisect-results
          path: |
            .ci-bisect/results.tsv
            .ci-bisect/*/botplay-report.txt
            .ci-bisect/*/cstrike/console.log
          if-no-files-found: ignore
          retention-days: 14
