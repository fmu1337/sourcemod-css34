name: Release

# Tag format examples (must match builder/versions.env pins):
#   1.11.0.6970-mm1.10.7   → sm11-oldstable
#   1.12.0.7245-mm1.12.0   → sm12-latest
#   1.13.0.7404-mm1.12.0   → sm13-dev
#   1.13.0.7404-mm2.0.0    → sm13-mm20
# Pushing a matching tag builds SM+MM for Linux (legacy-build) and Windows
# and publishes a GitHub Release. CSS34_LINE is derived from the tag.
on:
  push:
    tags:
      - '*-mm*'
  workflow_dispatch:
    inputs:
      css34_line:
        description: "CSS34_LINE for manual dispatch (ignored on tag pushes)"
        required: false
        default: "sm13-dev"

permissions:
  contents: write

env:
  PURE_SOURCE_BUILD: "1"

jobs:
  resolve-line:
    runs-on: ubuntu-22.04
    outputs:
      css34_line: ${{ steps.map.outputs.css34_line }}
    steps:
      - name: Map tag / input → CSS34_LINE
        id: map
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            case "${tag}" in
              1.11.0.6970-mm1.10.7) line=sm11-oldstable ;;
              1.12.0.7245-mm1.12.0) line=sm12-latest ;;
              1.13.0.7404-mm1.12.0) line=sm13-dev ;;
              1.13.0.7404-mm2.0.0)  line=sm13-mm20 ;;
              *)
                echo "Unknown release tag '${tag}' — add a mapping in release.yml" >&2
                exit 1
                ;;
            esac
          else
            line="${{ github.event.inputs.css34_line || 'sm13-dev' }}"
          fi
          echo "css34_line=${line}" >> "$GITHUB_OUTPUT"
          echo "Resolved CSS34_LINE=${line} (ref=${GITHUB_REF_NAME})"

  linux:
    needs: [resolve-line]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build SourceMod + Metamod (legacy-build / pure-source)
        env:
          CSS34_LINE: ${{ needs.resolve-line.outputs.css34_line }}
          PURE_SOURCE_BUILD: "1"
        run: |
          chmod +x builder/docker/legacy-build.sh builder/run/linux.sh \
            builder/checkout-deps.sh builder/package.sh builder/package-metamod.sh \
            builder/build-metamod.sh builder/prepare-package.sh builder/write-build-stamps.sh \
            builder/resolve-version.sh builder/py.sh builder/patches/*.sh \
            builder/install-clang9.sh builder/install-clang10.sh
          builder/docker/legacy-build.sh

      - name: Upload SourceMod artifact
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-linux
          path: packages/sourcemod-*-css34-linux.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Upload Metamod artifact
        uses: actions/upload-artifact@v4
        with:
          name: metamod-css34-linux
          path: packages/mmsource-*-css34-linux.tar.gz
          if-no-files-found: error
          retention-days: 1

  windows:
    needs: [resolve-line]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build SourceMod + Metamod for CS:S v34
        shell: bash
        env:
          CSS34_LINE: ${{ needs.resolve-line.outputs.css34_line }}
          PURE_SOURCE_BUILD: "1"
        run: |
          export WDIR="$PWD"
          chmod +x builder/run/windows.sh builder/checkout-deps.sh builder/prepare-package.sh \
            builder/build-metamod.sh builder/write-build-stamps.sh builder/resolve-version.sh \
            builder/py.sh builder/patches/*.sh
          builder/run/windows.sh

      - name: Upload SourceMod artifact
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-windows
          path: packages/sourcemod-*-css34-windows.zip
          if-no-files-found: error
          retention-days: 1

      - name: Upload Metamod artifact
        uses: actions/upload-artifact@v4
        with:
          name: metamod-css34-windows
          path: packages/mmsource-*-css34-windows.zip
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [resolve-line, linux, windows]
    runs-on: ubuntu-22.04
    if: github.ref_type == 'tag'
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -la artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/sourcemod-*-css34-linux.tar.gz
            artifacts/sourcemod-*-css34-windows.zip
            artifacts/mmsource-*-css34-linux.tar.gz
            artifacts/mmsource-*-css34-windows.zip
          body: |
            CS:S v34 packages for tag `${{ github.ref_name }}`.

            **Assets**
            - SourceMod Linux / Windows
            - Metamod:Source Linux / Windows

            Build line: `${{ needs.resolve-line.outputs.css34_line }}` (pure-source, legacy-build Linux, no reference binary splice).
            Pins are resolved from `builder/versions.env` via `builder/resolve-version.sh`.
