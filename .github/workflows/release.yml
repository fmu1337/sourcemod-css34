name: Release

# Tag format examples:
#   1.11.0.6970-mm1.10.7
#   1.12.0.7245-mm1.12.0
#   1.13.0.7404-mm1.12.0
# Pushing a matching tag builds SM+MM for Linux and Windows and publishes a GitHub Release.
# Set CSS34_LINE (or SOURCEMOD_* / MMS_*) before tagging so release assets match.
on:
  push:
    tags:
      - '*-mm*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CSS34_LINE: sm13-dev
  PURE_SOURCE_BUILD: "1"

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            g++-9-multilib \
            gcc-9-multilib \
            git \
            lib32stdc++-9-dev \
            lib32stdc++6 \
            lib32z1-dev \
            libc6-dev-i386 \
            libstdc++-9-dev \
            linux-libc-dev \
            python3 \
            python3-pip

      - name: Build SourceMod + Metamod for CS:S v34
        env:
          SKIP_APT_INSTALL: 1
          CC: gcc-9
          CXX: g++-9
          CSS34_LINE: ${{ env.CSS34_LINE }}
          PURE_SOURCE_BUILD: ${{ env.PURE_SOURCE_BUILD }}
        run: |
          export WDIR="$PWD"
          chmod +x builder/run/linux.sh builder/checkout-deps.sh builder/package.sh \
            builder/package-metamod.sh builder/build-metamod.sh builder/prepare-package.sh \
            builder/write-build-stamps.sh builder/resolve-version.sh builder/py.sh builder/patches/*.sh \
            builder/install-clang9.sh builder/install-clang10.sh
          builder/run/linux.sh

      - name: Upload SourceMod artifact
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-linux
          path: packages/sourcemod-*-css34-linux.tar.gz
          if-no-files-found: error

      - name: Upload Metamod artifact
        uses: actions/upload-artifact@v4
        with:
          name: metamod-css34-linux
          path: packages/mmsource-*-css34-linux.tar.gz
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build SourceMod + Metamod for CS:S v34
        shell: bash
        env:
          CSS34_LINE: ${{ env.CSS34_LINE }}
          PURE_SOURCE_BUILD: ${{ env.PURE_SOURCE_BUILD }}
        run: |
          export WDIR="$PWD"
          chmod +x builder/run/windows.sh builder/checkout-deps.sh builder/prepare-package.sh \
            builder/build-metamod.sh builder/write-build-stamps.sh builder/resolve-version.sh \
            builder/py.sh builder/patches/*.sh
          builder/run/windows.sh

      - name: Upload SourceMod artifact
        uses: actions/upload-artifact@v4
        with:
          name: sourcemod-css34-windows
          path: packages/sourcemod-*-css34-windows.zip
          if-no-files-found: error

      - name: Upload Metamod artifact
        uses: actions/upload-artifact@v4
        with:
          name: metamod-css34-windows
          path: packages/mmsource-*-css34-windows.zip
          if-no-files-found: error

  release:
    needs: [linux, windows]
    runs-on: ubuntu-22.04
    if: github.ref_type == 'tag'
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -la artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/sourcemod-*-css34-linux.tar.gz
            artifacts/sourcemod-*-css34-windows.zip
            artifacts/mmsource-*-css34-linux.tar.gz
            artifacts/mmsource-*-css34-windows.zip
          body: |
            CS:S v34 packages for tag `${{ github.ref_name }}`.

            **Assets**
            - SourceMod Linux / Windows
            - Metamod:Source Linux / Windows

            Build line: `${{ env.CSS34_LINE }}` (pure-source, no reference binary splice).
            Pins are resolved from `builder/versions.env` via `builder/resolve-version.sh`.
